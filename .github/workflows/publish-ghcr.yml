name: Publish GHCR Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".planning/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/qsb-ask

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to Coolify
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK" ] || [ -z "$COOLIFY_TOKEN" ]; then
            echo "COOLIFY_WEBHOOK and COOLIFY_TOKEN repository secrets are required."
            exit 1
          fi

          for attempt in 1 2 3 4 5; do
            echo "Triggering Coolify deployment, attempt ${attempt}/5..."
            http_code="$(
              curl --show-error --silent --output /tmp/coolify-webhook-response.txt \
                --write-out "%{http_code}" \
                --connect-timeout 10 \
                --max-time 60 \
                --request GET "$COOLIFY_WEBHOOK" \
                --header "Authorization: Bearer $COOLIFY_TOKEN" \
                || true
            )"

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "Coolify deployment webhook accepted with HTTP ${http_code}."
              exit 0
            fi

            echo "Coolify deployment webhook returned HTTP ${http_code}."
            if [ "$attempt" -lt 5 ]; then
              sleep 20
            fi
          done

          echo "Coolify deployment webhook did not succeed after 5 attempts."
          exit 1
